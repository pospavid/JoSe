name: Denní kontrola práce

on:
  schedule:
    - cron: '0 6 * * *' # Spustí se každý den v 6:00 ráno UTC
  workflow_dispatch: # Tlačítko pro ruční spuštění kdykoliv

jobs:
  scrape_and_deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Nutné pro uložení index.html do repozitáře

    steps:
    - name: Checkout repozitáře
      uses: actions/checkout@v4

    - name: Nastavení Pythonu
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Instalace knihoven
      run: |
        pip install requests beautifulsoup4

    - name: Spuštění scraperu
      run: python scraper.py

    - name: Uložení změn a publikace
      run: |
        git config --global user.email "github-actions@github.com"
        git config --global user.name "github-actions"
        git add index.html
        git commit -m "Aktualizace nabídek: $(date +'%Y-%m-%d')" || echo "Žádné nové změny"
        git push
